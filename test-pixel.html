<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Teste de Pixel — Utmify</title>
    <script>
        window.pixelId = "69e292a38ea606ab7ebd42c4";
        var a = document.createElement("script");
        a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
        a.setAttribute("async", "");
        a.setAttribute("defer", "");
        document.head.appendChild(a);
    </script>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
    <style>
        body { font-family: monospace; background: #0f0f0f; color: #eee; padding: 2rem; }
        h1 { color: #fff; margin-bottom: 1rem; }
        button { padding: 12px 24px; margin: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-test { background: #3b82f6; color: white; }
        .btn-purchase { background: #22c55e; color: white; }
        .btn-view { background: #f59e0b; color: black; }
        .btn-clear { background: #6b7280; color: white; }
        #log { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-top: 1rem; min-height: 200px; max-height: 500px; overflow-y: auto; font-size: 13px; }
        .ok { color: #22c55e; }
        .err { color: #ef4444; }
        .info { color: #60a5fa; }
        .warn { color: #f59e0b; }
        .section { margin: 1.5rem 0; padding: 1rem; background: #1a1a1a; border-radius: 8px; }
        label { display: block; margin-bottom: 4px; color: #9ca3af; font-size: 12px; }
        input { background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 8px 12px; border-radius: 4px; margin-right: 8px; font-family: monospace; }
        .status-row { display: flex; gap: 2rem; margin-bottom: 1rem; }
        .status-item { padding: 8px 16px; border-radius: 6px; font-size: 13px; }
    </style>
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "whtdckx3fs");
    </script>
</head>
<body>
    <h1>🔬 Teste de Pixel — Utmify</h1>

    <div class="section">
        <h3 style="margin:0 0 0.5rem 0">Estado do Pixel</h3>
        <div class="status-row">
            <div class="status-item" id="status-fbq" style="background:#333">fbq: verificando...</div>
            <div class="status-item" id="status-utmify" style="background:#333">utmify: verificando...</div>
            <div class="status-item" id="status-pixelid" style="background:#333">pixelId: verificando...</div>
            <div class="status-item" id="status-lead" style="background:#333">lead localStorage: verificando...</div>
        </div>
    </div>

    <div class="section">
        <h3 style="margin:0 0 0.5rem 0">Disparar Eventos de Teste</h3>
        <div style="margin-bottom:1rem">
            <label>Valor da venda (€)</label>
            <input type="number" id="test-value" value="29.90" step="0.01" style="width:120px">
        </div>
        <button class="btn-purchase" onclick="testPurchase()">🛒 Purchase (cliente)</button>
        <button class="btn-view" onclick="testViewContent()">👁 ViewContent</button>
        <button class="btn-test" onclick="testInitCheck()">🔍 Verificar Estado</button>
        <button class="btn-clear" onclick="clearLog()">🗑 Limpar Log</button>
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #333">
            <div style="color:#f59e0b;font-size:12px;margin-bottom:8px">TESTE SERVIDOR → Utmify (simula webhook WayMB COMPLETED)</div>
            <button style="background:#7c3aed;color:white;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:14px" onclick="testServerFire()">🚀 Disparar Purchase SERVER-SIDE</button>
        </div>
    </div>

    <div id="log"><span class="info">Aguardando ação...</span></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('pt-PT', { hour12: false });
            const line = document.createElement('div');
            line.innerHTML = `<span style="color:#666">[${time}]</span> <span class="${type}">${msg}</span>`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStatus() {
            const fbqEl = document.getElementById('status-fbq');
            const utmEl = document.getElementById('status-utmify');
            const pidEl = document.getElementById('status-pixelid');
            const leadEl = document.getElementById('status-lead');

            if (typeof fbq !== 'undefined') {
                fbqEl.textContent = 'fbq: ✓ disponível';
                fbqEl.style.background = '#166534';
            } else {
                fbqEl.textContent = 'fbq: ✗ não encontrado';
                fbqEl.style.background = '#7f1d1d';
            }

            if (typeof window.utmify === 'function') {
                utmEl.textContent = 'window.utmify: ✓ disponível';
                utmEl.style.background = '#166534';
            } else {
                utmEl.textContent = 'window.utmify: ✗ normal (usa fbq)';
                utmEl.style.background = '#374151';
            }

            pidEl.textContent = 'pixelId: ' + (window.pixelId || 'não definido');
            pidEl.style.background = window.pixelId ? '#1e3a5f' : '#7f1d1d';

            try {
                const leadRaw = localStorage.getItem('lead');
                const lead = leadRaw ? JSON.parse(leadRaw) : null;
                if (lead && lead._id) {
                    leadEl.textContent = 'lead: ✓ _id=' + lead._id.substring(0, 8) + '...';
                    leadEl.style.background = '#166534';
                } else {
                    leadEl.textContent = 'lead: ✗ não encontrado';
                    leadEl.style.background = '#7f1d1d';
                }
            } catch(e) {
                leadEl.textContent = 'lead: erro';
                leadEl.style.background = '#7f1d1d';
            }
        }

        function utmifyTrack(eventType, value, currency) {
            // Step 1: fbq para Meta
            if (typeof fbq !== 'undefined') {
                try {
                    fbq('track', eventType, { value: value, currency: currency || 'EUR' });
                    log(`✓ fbq('track', '${eventType}', { value: ${value}, currency: '${currency || 'EUR'}' }) — disparado`, 'ok');
                } catch(e) { log('✗ Erro no fbq: ' + e, 'err'); }
            } else {
                log('✗ fbq não disponível — pixel.js não carregado?', 'err');
            }
            // Step 2: POST directo para API da Utmify (registo de conversão + atribuição de campanha)
            try {
                const leadRaw = localStorage.getItem('lead');
                const lead = leadRaw ? JSON.parse(leadRaw) : null;
                if (!lead || !lead._id) {
                    log('⚠ lead não encontrado no localStorage (chave "lead") — pixel.js ainda não inicializou!', 'warn');
                    log('→ Aguarda 3–5 segundos após carregar a página e tenta novamente', 'warn');
                    return;
                }
                log(`✓ Lead encontrado: _id=${lead._id} | pixelId=${lead.pixelId}`, 'ok');
                const eventId = Array.from(crypto.getRandomValues(new Uint8Array(12)))
                    .map(b => b.toString(16).padStart(2, '0')).join('');
                log(`→ A enviar '${eventType}' para tracking.utmify.com.br... (lead._id: ${lead._id})`, 'info');
                const leadToSend = Object.assign({}, lead, { updatedAt: new Date() });
                if (leadToSend.parameters && typeof leadToSend.parameters === 'object') {
                    leadToSend.parameters = JSON.stringify(leadToSend.parameters);
                }
                fetch('https://tracking.utmify.com.br/tracking/v1/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: eventType,
                        value: value,
                        currency: currency || 'EUR',
                        lead: leadToSend,
                        event: { _id: eventId, pageTitle: document.title, sourceUrl: window.location.href }
                    })
                }).then(r => r.json())
                  .then(d => {
                      log(`✅ Resposta da Utmify: ${JSON.stringify(d).substring(0, 200)}`, 'ok');
                  })
                  .catch(e => log('✗ Erro na chamada à Utmify: ' + e, 'err'));
            } catch(e) {
                log('✗ Erro: ' + e, 'err');
            }
        }

        function testPurchase() {
            const value = parseFloat(document.getElementById('test-value').value) || 29.90;
            log(`→ A disparar Purchase com valor €${value}...`, 'info');
            utmifyTrack('Purchase', value, 'EUR');
        }

        async function testServerFire() {
            const value = parseFloat(document.getElementById('test-value').value) || 29.90;
            log('─── TESTE SERVER-SIDE ───', 'info');
            log(`→ A ler lead do localStorage...`, 'info');

            let lead = null;
            try {
                const raw = localStorage.getItem('lead');
                lead = raw ? JSON.parse(raw) : null;
            } catch(e) {}

            if (!lead || !lead._id) {
                log('⚠ lead não encontrado no localStorage — servidor vai usar último lead da base de dados como fallback...', 'warn');
            } else {
                log(`✓ Lead localStorage: _id=${lead._id}`, 'ok');
            }
            log(`→ A enviar Purchase €${value} para servidor PHP → Utmify...`, 'info');

            try {
                const resp = await fetch('/api/test-fire.php?s=fire2026', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lead: lead, amount: value })
                });
                const d = await resp.json();

                if (d.success) {
                    log(`✅ Utmify confirmou! HTTP ${d.http_code}`, 'ok');
                    log(`   lead._id enviado: ${d.sent.lead_id}`, 'ok');
                    log(`   lead_source: ${d.sent.lead_source}`, 'ok');
                    log(`   event_id: ${d.sent.event_id}`, 'ok');
                    log(`   Resposta: ${JSON.stringify(d.utmify_obj || d.utmify_raw).substring(0,300)}`, 'ok');
                    log('→ Verifica o painel Utmify em 30-60 segundos', 'warn');
                } else {
                    log(`✗ Falhou: ${d.error || JSON.stringify(d)}`, 'err');
                    if (d.curl_error) log(`   CURL erro: ${d.curl_error}`, 'err');
                }
            } catch(e) {
                log('✗ Erro de rede: ' + e, 'err');
            }
        }

        function testViewContent() {
            if (typeof fbq !== 'undefined') {
                fbq('track', 'ViewContent');
                log('✓ fbq ViewContent disparado', 'ok');
            } else {
                log('✗ fbq não disponível', 'err');
            }
        }

        function testInitCheck() {
            updateStatus();
            log('--- Estado atual ---', 'info');
            log('fbq: ' + (typeof fbq !== 'undefined' ? '✓ disponível' : '✗ undefined'), typeof fbq !== 'undefined' ? 'ok' : 'err');
            log('window.utmify: ' + (typeof window.utmify === 'function' ? '✓ função' : '✗ não exposta pelo pixel.js (normal)'), 'warn');
            log('window.pixelId: ' + (window.pixelId || 'não definido'), window.pixelId ? 'ok' : 'err');

            // Check lead in localStorage (KEY for Utmify direct API tracking)
            try {
                const leadRaw = localStorage.getItem('lead');
                const lead = leadRaw ? JSON.parse(leadRaw) : null;
                if (lead && lead._id) {
                    log('✓ lead localStorage: _id=' + lead._id, 'ok');
                    log('  pixelId=' + (lead.pixelId || 'N/A') + ' | parameters=' + JSON.stringify(lead.parameters || {}).substring(0, 100), 'ok');
                } else {
                    log('⚠ lead não encontrado no localStorage — pixel.js ainda não inicializou (aguarda 3–5s)', 'warn');
                }
            } catch(e) {
                log('✗ erro ao ler localStorage: ' + e, 'err');
            }

            // Check UTMs stored by Utmify
            const keys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            let foundUtm = false;
            keys.forEach(k => {
                const val = localStorage.getItem(k) || sessionStorage.getItem(k) ||
                    document.cookie.split(';').find(c => c.trim().startsWith(k + '='))?.split('=')[1];
                if (val) {
                    log(`${k}: ${val}`, 'ok');
                    foundUtm = true;
                }
            });
            if (!foundUtm) log('Nenhum UTM encontrado no storage (normal se não chegaste por campanha)', 'warn');
        }

        function clearLog() {
            logEl.innerHTML = '<span class="info">Log limpo.</span>';
        }

        // Auto-check status every 2s until pixel loads
        let checkCount = 0;
        const statusInterval = setInterval(() => {
            updateStatus();
            checkCount++;
            if (checkCount > 10 || typeof fbq !== 'undefined') {
                clearInterval(statusInterval);
                if (typeof fbq !== 'undefined') {
                    log('✅ Pixel carregado e pronto para disparar eventos!', 'ok');
                } else {
                    log('⚠ Pixel ainda não carregou após 20s — possível problema de rede ou ID inválido', 'warn');
                }
            }
        }, 2000);

        updateStatus();
        log('Página carregada. Pixel a inicializar...', 'info');
    </script>
</body>
</html>
